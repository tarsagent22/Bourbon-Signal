name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: https://bourbonsignal.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ops workflow guardrails
        run: npm run test:ops

      - name: Verify checked-in engine site contract
        run: npm --prefix engine run verify:site

      - name: Verify PA engine automation guardrails
        run: npm --prefix engine run verify:pa:automation

      - name: Build site
        run: npm run build
